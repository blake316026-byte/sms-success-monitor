<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短信后台工作台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="workbench-body">
    <header class="workbench-shell">
      <div class="tab-strip" id="tabs" role="tablist"></div>
      <div class="browser-toolbar">
        <button class="icon-button" id="back" title="后退" aria-label="后退"><i data-lucide="chevron-left"></i></button>
        <button class="icon-button" id="forward" title="前进" aria-label="前进"><i data-lucide="chevron-right"></i></button>
        <button class="icon-button" id="reload" title="刷新" aria-label="刷新"><i data-lucide="refresh-cw"></i></button>
        <form id="address-form" class="address-form">
          <i data-lucide="lock-keyhole"></i>
          <input id="address" aria-label="后台地址" autocomplete="off" spellcheck="false">
        </form>
        <label class="sample-limit-control" title="设置全部后台的监控样本条数">
          <i data-lucide="hash"></i>
          <input id="sample-limit" type="number" min="10" max="500" step="10" aria-label="样本条数">
          <span>条</span>
        </label>
        <div class="zoom-control" role="group" aria-label="后台页面缩放">
          <button id="zoom-out" title="缩小后台页面（Ctrl -）" aria-label="缩小后台页面"><i data-lucide="zoom-out"></i></button>
          <button class="zoom-value" id="zoom-reset" title="恢复 100%（Ctrl 0）" aria-label="恢复实际大小">100%</button>
          <button id="zoom-in" title="放大后台页面（Ctrl +）" aria-label="放大后台页面"><i data-lucide="zoom-in"></i></button>
        </div>
        <button class="icon-button" id="scan" title="扫描当前后台" aria-label="扫描当前后台"><i data-lucide="radar"></i></button>
        <button class="icon-button" id="detail" title="监控总览" aria-label="监控总览"><i data-lucide="table-properties"></i></button>
        <button class="icon-button" id="credentials" title="自动登录设置" aria-label="自动登录设置"><i data-lucide="key-round"></i></button>
        <button class="icon-button" id="find" title="在当前后台中查找（Ctrl F）" aria-label="在当前后台中查找"><i data-lucide="search"></i></button>
        <button class="icon-button" id="add" title="新增独立页面" aria-label="新增独立页面"><i data-lucide="plus"></i></button>
        <button class="icon-button" id="rename-page" title="重命名自定义页面" aria-label="重命名自定义页面"><i data-lucide="pencil"></i></button>
        <button class="icon-button" id="close-page" title="关闭自定义页面" aria-label="关闭自定义页面"><i data-lucide="x"></i></button>
      </div>
      <div class="find-bar" id="find-bar" hidden>
        <i data-lucide="search" aria-hidden="true"></i>
        <input id="find-input" type="search" autocomplete="off" spellcheck="false" aria-label="查找当前后台网页内容" placeholder="查找网页内容">
        <span id="find-count" aria-live="polite"></span>
        <button id="find-previous" title="上一个（Shift Enter）" aria-label="上一个匹配项"><i data-lucide="chevron-up"></i></button>
        <button id="find-next" title="下一个（Enter）" aria-label="下一个匹配项"><i data-lucide="chevron-down"></i></button>
        <button id="find-close" title="关闭（Esc）" aria-label="关闭查找栏"><i data-lucide="x"></i></button>
      </div>
    </header>

    <dialog id="add-dialog" class="page-dialog">
      <form method="dialog" id="add-form">
        <div class="dialog-heading">
          <h2>新增独立后台页面</h2>
          <button type="button" class="icon-button" id="cancel-add" title="关闭" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <label>页面名称<input id="page-name" required placeholder="例如：代理 A"></label>
        <label>后台地址<input id="page-url" required placeholder="https://example.com/login"></label>
        <p class="dialog-error" id="dialog-error"></p>
        <div class="dialog-actions">
          <button type="button" class="secondary-button" id="cancel-add-bottom">取消</button>
          <button type="submit" class="primary-button">创建页面</button>
        </div>
      </form>
    </dialog>

    <dialog id="credentials-dialog" class="page-dialog">
      <form method="dialog" id="credentials-form">
        <div class="dialog-heading">
          <h2 id="credentials-title">自动登录设置</h2>
          <button type="button" class="icon-button" id="cancel-credentials" title="关闭" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <label>后台账号<input id="credential-username" required autocomplete="off"></label>
        <label>后台密码<input id="credential-password" type="password" autocomplete="new-password"></label>
        <label>Google 密钥<input id="credential-totp" type="password" autocomplete="off" placeholder="没有二次验证可留空"></label>
        <label class="checkbox-row" id="clear-totp-row" hidden>
          <input id="credential-clear-totp" type="checkbox">清除已保存的 Google 密钥
        </label>
        <label class="checkbox-row">
          <input id="credential-enabled" type="checkbox" checked>Token 失效时自动登录并恢复监控
        </label>
        <p class="credential-status" id="credential-status"></p>
        <p class="dialog-error" id="credentials-error"></p>
        <div class="dialog-actions split-actions">
          <button type="button" class="secondary-button danger-button" id="remove-credentials">删除配置</button>
          <span></span>
          <button type="button" class="secondary-button" id="cancel-credentials-bottom">取消</button>
          <button type="submit" class="primary-button">保存</button>
        </div>
      </form>
    </dialog>
    <script src="workbench.js"></script>
  </body>
</html>
