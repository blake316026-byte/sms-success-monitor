name: Publish client release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-client-release
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/windows-electron/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix clients/windows-electron
      - name: Run shared checks
        run: npm test --prefix clients/windows-electron
      - name: Package Windows client
        run: npm run package:windows --prefix clients/windows-electron
      - name: Verify packaged Windows DPAPI, OCR, TOTP, zoom and page find runtime
        timeout-minutes: 3
        shell: pwsh
        run: |
          $checkRoot = Join-Path $PWD "dist/windows-self-test"
          $resultPath = Join-Path $checkRoot "result.txt"
          Expand-Archive -Path "dist/windows/SMS-Success-Monitor-Windows-x64.zip" -DestinationPath $checkRoot -Force
          $exePath = Join-Path $checkRoot "SMS Success Monitor/SMS Success Monitor.exe"
          $env:SMS_MONITOR_LOCAL_AUTOMATION_CHECK = "1"
          $env:SMS_MONITOR_LOCAL_AUTOMATION_RESULT = $resultPath
          $process = Start-Process -FilePath $exePath -Wait -PassThru
          if (Test-Path $resultPath) { Get-Content $resultPath }
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-client
          path: dist/windows/SMS-Success-Monitor-Windows-x64.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-client
          path: release-assets
      - name: Add verified macOS and Android clients
        run: |
          cp release-seed/SMS-Success-Monitor-macOS-universal.zip release-assets/
          cp release-seed/SMS-Success-Monitor-Android.apk release-assets/
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum SMS-Success-Monitor-* > SHA256SUMS.txt
      - name: Write release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## 三端客户端下载

          - **macOS**：Universal 2，同时支持 Apple Silicon 和 Intel Mac
          - **Windows**：64 位 Windows 10/11，完整解压 ZIP 后运行
          - **Android**：Android 8.0 及以上，安装 APK 后授权通知和悬浮窗

          每个平台默认每分钟扫描最新 200 条短信，用户可在客户端把全局样本数设置为 10–500 条；设置只保存在当前设备，保存后立即按新值重扫。只有 `SUCCESS` 计为成功；成功率低于 50% 报警，多个报警时展示最低值，未登录平台不覆盖有效监控结果。

          同一后台连续两次扫描异常时，客户端会自动重载该后台连接并立即重试，不清除登录状态，也不影响其他后台。

          **v0.3.2 自动登录**：用户可在每个后台的钥匙图标中，把账号、密码和可选 Google 密钥保存到设备本地加密存储。Token 失效后，客户端在本地识别图片验证码、生成 Google 动态码并自动获取新 Token；所有凭据与 Token 均不上传数据库。

          **v0.3.3 样本设置**：macOS、Windows 和 Android 均可人工设置样本条数，客户端会自动翻页取得完整样本，并在修改后立即重新扫描全部已登录后台。

          **v0.3.4 Windows 工作台缩放**：Windows 后台页面支持 50%–200% 缩放，可使用工作台工具栏、`Ctrl +`、`Ctrl -`、`Ctrl 0` 或 `Ctrl + 鼠标滚轮`；缩放比例只保存在当前设备。

          **v0.3.5 工作台网页查找**：Windows 使用 `Ctrl-F`、macOS 使用 `Command-F` 查找当前选中的后台网页内容，可切换上一个和下一个匹配项；切换后台标签后按当前关键词继续查找。

          **v0.3.6 登录与页面管理**：修复图片验证码与 Google 动态码自动提交，macOS 后台钥匙串访问不再反复阻塞工作台；macOS 和 Windows 自定义页面支持重命名与删除。

          **v0.3.7 自定义页面自动登录**：macOS 和 Windows 新增的独立后台页面现在也可配置账号、密码和 Google 密钥，并在 Token 失效后自动登录。macOS 配置改为应用专用 AES-GCM 加密文件，保存后立即回读校验，并已完全移除旧钥匙串访问，避免系统授权弹窗。旧钥匙串中的配置不会继续读取，需要在新版中重新保存一次。

          这些是内部签名版本。macOS 和 Windows 首次启动可能显示来源提示；Android 需要允许该来源安装应用。
          NOTES
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/SMS-Success-Monitor-macOS-universal.zip
          release-assets/SMS-Success-Monitor-Windows-x64.zip
          release-assets/SMS-Success-Monitor-Android.apk
          release-assets/SHA256SUMS.txt
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "SMS Success Monitor ${GITHUB_REF_NAME}"
          --notes-file release-notes.md
